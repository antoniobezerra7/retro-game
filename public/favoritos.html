<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favoritos - Retro Game</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <!-- ===== HEADER ===== -->
    <header>
        <div class="header-container">
            <div class="logo">
                🎮 Retro Game
            </div>
            <nav>
                <a href="index.html">Home</a>
                <a id="cadastroLink" href="cadastro_itens.html" style="display: none;">➕ Cadastro</a>
            </nav>
            <div class="auth-buttons">
                <span id="userName" style="color: white; font-weight: 600;"></span>
                <button id="loginBtn" class="btn btn-secondary" onclick="irParaLogin()">Login</button>
                <button id="logoutBtn" class="btn btn-danger" onclick="fazerLogout()" style="display: none;">Logout</button>
            </div>
        </div>
    </header>

    <!-- ===== CONTEÚDO PRINCIPAL ===== -->
    <main style="min-height: calc(100vh - 200px);">
        <section class="cards-section">
            <h2 class="section-title">❤️ Meus Favoritos</h2>
            <div id="favoritosContainer" class="cards-grid">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Carregando favoritos...</p>
                </div>
            </div>
        </section>
    </main>

    <!-- ===== FOOTER ===== -->
    <footer>
        <p>&copy; 2025 Retro Game. Todos os direitos reservados.</p>
    </footer>

    <!-- ===== SCRIPTS ===== -->
    <script src="assets/scripts/app.js"></script>
</body>
</html>
