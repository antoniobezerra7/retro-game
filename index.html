<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RetroGame</title>
  <script src="./assets/js/login.js" defer></script>
  <link rel="stylesheet" href="styles.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <div>
        <h1 class="site-title">Retro<span>Game</span></h1>
        <p class="site-subtitle">Coleção de clássicos que marcaram época</p>
      </div>

      <div class="header-actions">
        <nav class="nav-menu">
          <a href="index.html">Início</a>
          <a href="#destaques">Destaques</a>
          <a href="#colecao">Coleção</a>
          <a href="favoritos.html">Favoritos</a>
        </nav>

        <div id="loginArea" class="login-area"></div>
      </div>
    </div>
  </header>

  <main class="container main-content">
    <section id="destaques" class="section-block">
      <div class="section-title-wrap">
        <h2 class="section-title">Destaques</h2>
        <p>Os maiores clássicos da coleção em destaque no carrossel.</p>
      </div>

      <div id="carouselDestaques" class="carousel slide carousel-fade shadow-lg rounded-4 overflow-hidden" data-bs-ride="carousel">
        <div class="carousel-indicators" id="carouselIndicators"></div>
        <div class="carousel-inner" id="carouselInner"></div>

        <button class="carousel-control-prev" type="button" data-bs-target="#carouselDestaques" data-bs-slide="prev">
          <span class="carousel-control-prev-icon"></span>
        </button>

        <button class="carousel-control-next" type="button" data-bs-target="#carouselDestaques" data-bs-slide="next">
          <span class="carousel-control-next-icon"></span>
        </button>
      </div>
    </section>

    <section id="colecao" class="section-block">
      <div class="section-title-wrap">
        <h2 class="section-title">Coleção</h2>
        <p>Seleção de jogos clássicos com opção de favoritar.</p>
      </div>

      <div class="row g-4" id="cardsContainer"></div>
    </section>
  </main>

  <footer class="site-footer text-center py-4 mt-4">
    <div class="container">
      <p class="mb-1">© 2026 RetroGame</p>
      <p class="mb-0">Reviva a nostalgia dos clássicos</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
