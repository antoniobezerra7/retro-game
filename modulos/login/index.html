<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | RetroGame</title>
  <link rel="stylesheet" href="../../styles.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <script src="../../assets/js/login.js" defer></script>
</head>
<body class="login-page">

  <main class="container login-container">
    <section class="login-card">
      <div class="login-brand">
        <h1 class="site-title">Retro<span>Game</span></h1>
        <p class="site-subtitle">Entre para favoritar seus jogos clássicos</p>
      </div>

      <form id="loginForm" class="login-form">
        <div class="mb-3">
          <label for="login" class="form-label">Login</label>
          <input type="text" class="form-control custom-input" id="login" required>
        </div>

        <div class="mb-3">
          <label for="senha" class="form-label">Senha</label>
          <input type="password" class="form-control custom-input" id="senha" required>
        </div>

        <div id="loginMensagem" class="login-message mb-3"></div>

        <button type="submit" class="btn btn-primary w-100">Entrar</button>
      </form>

      <div class="login-hint mt-3">
        Use <strong>admin / 123</strong> ou <strong>user / 123</strong>
      </div>
    </section>
  </main>

</body>
</html>
